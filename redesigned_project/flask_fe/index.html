<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --cream: #f5f0e8;
            --parchment: #ede8dc;
            --ink: #1a1410;
            --ink-soft: #4a3f35;
            --ink-faint: #8c7e72;
            --accent: #c0392b;
            --accent-dark: #922b21;
            --gold: #c9a84c;
            --border: #d4cbbf;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: stretch;
            overflow: hidden;
        }
        .panel-left {
            width: 42%;
            background-color: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .panel-left::before {
            content: '';
            position: absolute;
            top: -80px; left: -80px;
            width: 300px; height: 300px;
            border-radius: 50%;
            border: 60px solid rgba(201,168,76,0.08);
        }
        .panel-left::after {
            content: '';
            position: absolute;
            bottom: -60px; right: -60px;
            width: 240px; height: 240px;
            border-radius: 50%;
            border: 40px solid rgba(192,57,43,0.12);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideDown 0.6s ease-out both;
        }
        .brand-icon {
            width: 36px; height: 36px;
            border: 2px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            transform: rotate(45deg);
        }
        .brand-icon span {
            transform: rotate(-45deg);
            font-size: 14px;
            color: var(--gold);
            font-weight: 700;
        }
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: #f5f0e8;
            letter-spacing: 0.08em;
        }
        .panel-copy { animation: slideUp 0.7s 0.15s ease-out both; }
        .panel-copy h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            line-height: 1.15;
            color: #f5f0e8;
            margin-bottom: 1.25rem;
        }
        .panel-copy h2 em { font-style: italic; color: var(--gold); }
        .panel-copy p {
            font-size: 0.9rem;
            color: #9e948a;
            line-height: 1.7;
            max-width: 280px;
        }
        .panel-footer {
            font-size: 0.75rem;
            color: #5a524a;
            letter-spacing: 0.04em;
            animation: fadeIn 0.8s 0.3s ease-out both;
        }
        .deco-lines { display: flex; flex-direction: column; gap: 4px; margin-bottom: 1rem; }
        .deco-lines span { display: block; height: 1px; background: linear-gradient(to right, var(--gold), transparent); }
        .deco-lines span:nth-child(1) { width: 60px; }
        .deco-lines span:nth-child(2) { width: 40px; opacity: 0.5; }
        .deco-lines span:nth-child(3) { width: 20px; opacity: 0.25; }
        .panel-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            background-color: var(--cream);
            background-image: radial-gradient(circle at 90% 10%, rgba(201,168,76,0.05) 0%, transparent 50%), radial-gradient(circle at 10% 90%, rgba(192,57,43,0.04) 0%, transparent 50%);
        }
        .form-wrapper {
            width: 100%;
            max-width: 380px;
            animation: slideUp 0.6s 0.1s ease-out both;
        }
        .form-header { margin-bottom: 2.5rem; }
        .form-eyebrow {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.6rem;
        }
        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--ink);
            line-height: 1.2;
        }
        .form-subtitle { margin-top: 0.5rem; font-size: 0.85rem; color: var(--ink-faint); }
        .divider { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .divider span { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); }
        .field { margin-bottom: 1.4rem; position: relative; }
        .field label {
            display: block;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-bottom: 0.55rem;
        }
        .field input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #fff;
            border: 1.5px solid var(--border);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            border-radius: 0;
        }
        .field input::placeholder { color: #c5bdb5; }
        .field input:focus { border-color: var(--ink); box-shadow: 3px 3px 0 var(--ink); }
        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background-color: var(--ink);
            color: var(--cream);
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.2s;
            margin-top: 0.5rem;
            border-radius: 0;
        }
        .btn-submit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: translateX(-101%);
            transition: transform 0.3s ease;
        }
        .btn-submit:hover::after { transform: translateX(0); }
        .btn-submit span { position: relative; z-index: 1; }
        .msg {
            margin-top: 1rem;
            padding: 0.65rem 0.9rem;
            font-size: 0.82rem;
            text-align: center;
            border-left: 3px solid transparent;
            display: none;
        }
        .msg.success { border-color: #27ae60; color: #1e8449; background: #eafaf1; display: block; }
        .msg.error { border-color: var(--accent); color: var(--accent-dark); background: #fdf2f2; display: block; }
        .form-footer { margin-top: 1.75rem; text-align: center; font-size: 0.82rem; color: var(--ink-faint); }
        .form-footer a { color: var(--accent); text-decoration: none; font-weight: 500; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
        .form-footer a:hover { border-color: var(--accent); }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 720px) { .panel-left { display: none; } }
    </style>
</head>
<body>
    <div class="panel-left">
        <div class="brand">
            <div class="brand-icon"><span>V</span></div>
            <span class="brand-name">Vault</span>
        </div>
        <div class="panel-copy">
            <div class="deco-lines"><span></span><span></span><span></span></div>
            <h2>Your private<br><em>gateway</em><br>awaits.</h2>
            <p>Access your account securely. Everything you need, exactly where you left it.</p>
        </div>
        <div class="panel-footer">© 2025 Vault · All rights reserved</div>
    </div>
    <div class="panel-right">
        <div class="form-wrapper">
            <div class="form-header">
                <div class="form-eyebrow">Secure Access</div>
                <div class="form-title">Welcome back</div>
                <div class="form-subtitle">Enter your credentials to continue.</div>
            </div>
            <div class="divider"><span>credentials</span></div>
            <form id="loginForm" autocomplete="off">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="your_username" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit"><span>Sign In →</span></button>
            </form>
            <div id="message" class="msg"></div>
            <div class="form-footer">No account yet? <a href="signup.html">Create one</a></div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const msgEl = document.getElementById('message');
            msgEl.className = 'msg';
            msgEl.textContent = '';
            try {
                const response = await fetch('http://localhost:5001/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (response.ok) {
                    msgEl.className = 'msg success';
                    msgEl.textContent = '✓ Login successful! Status: 200 OK';
                } else {
                    const result = await response.json();
                    msgEl.className = 'msg error';
                    msgEl.textContent = result.error || 'Login failed. Please try again.';
                }
            } catch (err) {
                msgEl.className = 'msg error';
                msgEl.textContent = 'Unable to reach server. Check your connection.';
            }
        });
    </script>
</body>
</html>
